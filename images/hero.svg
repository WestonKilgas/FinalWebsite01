<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Cozy medieval dog café interior: happy cartoon dogs lounging at a Round Table, golden light streaming through arched stone windows, Camelot banners in coral and purple">
  <defs>
    <!-- Palette tokens -->
    <style>
      :root {
        --coral: #C84B31; --purple: #5B21B6; --green: #166534;
        --gold: #D97706; --cream: #FDF6E8; --beige: #F5EDD8;
        --espresso: #2C1810; --coral-lt: #F2A896; --gold-lt: #FCD34D;
      }
      .breathe { animation: breathe 6s ease-in-out infinite; }
      @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
      @media (prefers-reduced-motion:reduce){ .breathe{animation:none} }
    </style>

    <!-- Organic texture filter -->
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Soft glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Background blur for atmospheric perspective -->
    <filter id="atmos-blur">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>

    <!-- Sky / window light gradient -->
    <radialGradient id="windowLight" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FFF4D6" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#F5EDD8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EDE0C4" stop-opacity="0"/>
    </radialGradient>

    <!-- Floor gradient -->
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5A2B"/>
      <stop offset="100%" stop-color="#5C3317"/>
    </linearGradient>

    <!-- Stone wall gradient -->
    <linearGradient id="wallGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9B99A"/>
      <stop offset="100%" stop-color="#9E8A6D"/>
    </linearGradient>

    <!-- Candle glow -->
    <radialGradient id="candleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF0A0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>

    <!-- Table surface -->
    <radialGradient id="tableGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#D4A96A"/>
      <stop offset="100%" stop-color="#8B5E2B"/>
    </radialGradient>

    <!-- Dog body warm coat -->
    <radialGradient id="goldenCoat" cx="40%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#F5C97A"/>
      <stop offset="50%" stop-color="#D4883A"/>
      <stop offset="100%" stop-color="#8B4A10"/>
    </radialGradient>

    <!-- Coral dog coat -->
    <radialGradient id="coralCoat" cx="35%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#F2A896"/>
      <stop offset="60%" stop-color="#C84B31"/>
      <stop offset="100%" stop-color="#7B2215"/>
    </radialGradient>

    <!-- Purple/dark dog coat -->
    <radialGradient id="darkCoat" cx="40%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#9B7B5A"/>
      <stop offset="60%" stop-color="#6B4A2A"/>
      <stop offset="100%" stop-color="#3B2010"/>
    </radialGradient>
  </defs>

  <!-- ===== LAYER 1: FAR BACKGROUND (atmospheric blur) ===== -->
  <g filter="url(#atmos-blur)" opacity="0.85">
    <!-- Stone walls -->
    <rect width="1600" height="900" fill="url(#wallGrad)"/>
    <!-- Stone block texture -->
    <g fill="none" stroke="#B8A48A" stroke-width="1.5" opacity="0.4">
      <rect x="0" y="0" width="120" height="80"/><rect x="120" y="0" width="140" height="80"/>
      <rect x="260" y="0" width="120" height="80"/><rect x="380" y="0" width="160" height="80"/>
      <rect x="540" y="0" width="130" height="80"/><rect x="670" y="0" width="150" height="80"/>
      <rect x="820" y="0" width="120" height="80"/><rect x="940" y="0" width="140" height="80"/>
      <rect x="1080" y="0" width="160" height="80"/><rect x="1240" y="0" width="130" height="80"/>
      <rect x="1370" y="0" width="230" height="80"/>
      <rect x="60" y="80" width="140" height="80"/><rect x="200" y="80" width="120" height="80"/>
      <rect x="320" y="80" width="160" height="80"/><rect x="480" y="80" width="140" height="80"/>
      <rect x="620" y="80" width="120" height="80"/><rect x="740" y="80" width="150" height="80"/>
      <rect x="890" y="80" width="130" height="80"/><rect x="1020" y="80" width="120" height="80"/>
      <rect x="1140" y="80" width="160" height="80"/><rect x="1300" y="80" width="140" height="80"/>
      <rect x="1440" y="80" width="160" height="80"/>
    </g>
  </g>

  <!-- ===== LAYER 2: ARCHED WINDOWS (background, blurred) ===== -->
  <g filter="url(#atmos-blur)">
    <!-- Left window -->
    <g transform="translate(140,80)">
      <path d="M0,320 L0,60 Q0,0 80,0 Q160,0 160,60 L160,320 Z" fill="#87CEEB" opacity="0.7"/>
      <path d="M0,320 L0,60 Q0,0 80,0 Q160,0 160,60 L160,320 Z" fill="url(#windowLight)"/>
      <path d="M0,320 L0,60 Q0,0 80,0 Q160,0 160,60 L160,320 Z" fill="none" stroke="#8B7355" stroke-width="12"/>
      <!-- Window panes cross -->
      <line x1="80" y1="0" x2="80" y2="320" stroke="#8B7355" stroke-width="6"/>
      <line x1="0" y1="160" x2="160" y2="160" stroke="#8B7355" stroke-width="6"/>
      <!-- Window glow on floor -->
      <ellipse cx="80" cy="400" rx="100" ry="30" fill="#FFF4D6" opacity="0.3"/>
    </g>
    <!-- Right window -->
    <g transform="translate(1300,80)">
      <path d="M0,320 L0,60 Q0,0 80,0 Q160,0 160,60 L160,320 Z" fill="#87CEEB" opacity="0.7"/>
      <path d="M0,320 L0,60 Q0,0 80,0 Q160,0 160,60 L160,320 Z" fill="url(#windowLight)"/>
      <path d="M0,320 L0,60 Q0,0 80,0 Q160,0 160,60 L160,320 Z" fill="none" stroke="#8B7355" stroke-width="12"/>
      <line x1="80" y1="0" x2="80" y2="320" stroke="#8B7355" stroke-width="6"/>
      <line x1="0" y1="160" x2="160" y2="160" stroke="#8B7355" stroke-width="6"/>
    </g>
  </g>

  <!-- ===== LAYER 3: BANNERS ===== -->
  <g filter="url(#atmos-blur)" opacity="0.9">
    <!-- Coral banner left -->
    <g transform="translate(380,0)">
      <path d="M0,0 L80,0 L80,280 L40,240 L0,280 Z" fill="#C84B31"/>
      <path d="M0,0 L80,0 L80,280 L40,240 L0,280 Z" fill="none" stroke="#7B2215" stroke-width="2"/>
      <!-- Paw symbol on banner -->
      <circle cx="40" cy="100" r="18" fill="#FDF6E8" opacity="0.9"/>
      <circle cx="22" cy="80" r="9" fill="#FDF6E8" opacity="0.9"/>
      <circle cx="40" cy="72" r="9" fill="#FDF6E8" opacity="0.9"/>
      <circle cx="58" cy="80" r="9" fill="#FDF6E8" opacity="0.9"/>
    </g>
    <!-- Purple banner right -->
    <g transform="translate(1140,0)">
      <path d="M0,0 L80,0 L80,280 L40,240 L0,280 Z" fill="#5B21B6"/>
      <path d="M0,0 L80,0 L80,280 L40,240 L0,280 Z" fill="none" stroke="#2E1065" stroke-width="2"/>
      <!-- Crown symbol -->
      <path d="M20,110 L20,90 L35,100 L40,80 L45,100 L60,90 L60,110 Z" fill="#D97706"/>
    </g>
  </g>

  <!-- ===== LAYER 4: FLOOR ===== -->
  <g>
    <rect x="0" y="640" width="1600" height="260" fill="url(#floorGrad)"/>
    <!-- Floor planks -->
    <g stroke="#5C3317" stroke-width="1" opacity="0.4">
      <line x1="0" y1="700" x2="1600" y2="700"/>
      <line x1="0" y1="760" x2="1600" y2="760"/>
      <line x1="0" y1="820" x2="1600" y2="820"/>
      <line x1="0" y1="880" x2="1600" y2="880"/>
      <line x1="200" y1="640" x2="200" y2="900"/>
      <line x1="400" y1="640" x2="400" y2="900"/>
      <line x1="600" y1="640" x2="600" y2="900"/>
      <line x1="800" y1="640" x2="800" y2="900"/>
      <line x1="1000" y1="640" x2="1000" y2="900"/>
      <line x1="1200" y1="640" x2="1200" y2="900"/>
      <line x1="1400" y1="640" x2="1400" y2="900"/>
    </g>
    <!-- Sunlight patch on floor from left window -->
    <ellipse cx="320" cy="760" rx="180" ry="60" fill="#FFF4D6" opacity="0.25"/>
    <!-- Sunlight patch from right window -->
    <ellipse cx="1380" cy="760" rx="180" ry="60" fill="#FFF4D6" opacity="0.25"/>
  </g>

  <!-- ===== LAYER 5: ROUND TABLE ===== -->
  <g transform="translate(650,430)">
    <!-- Table shadow -->
    <ellipse cx="150" cy="220" rx="200" ry="40" fill="#2C1810" opacity="0.2"/>
    <!-- Table top -->
    <ellipse cx="150" cy="160" rx="200" ry="80" fill="url(#tableGrad)"/>
    <ellipse cx="150" cy="160" rx="200" ry="80" fill="none" stroke="#6B4020" stroke-width="4"/>
    <!-- Table rim highlight -->
    <ellipse cx="130" cy="140" rx="150" ry="55" fill="none" stroke="#E8C080" stroke-width="2" opacity="0.5"/>
    <!-- Table leg -->
    <path d="M90,230 Q150,280 210,230 L210,310 Q150,360 90,310 Z" fill="#6B4020"/>
    <path d="M110,300 L90,380" stroke="#5C3317" stroke-width="12" stroke-linecap="round"/>
    <path d="M190,300 L210,380" stroke="#5C3317" stroke-width="12" stroke-linecap="round"/>

    <!-- Tankards on table -->
    <!-- Tankard 1 -->
    <g transform="translate(40,90)">
      <rect x="0" y="0" width="36" height="50" rx="4" fill="#9BA8A0"/>
      <rect x="0" y="0" width="36" height="50" rx="4" fill="none" stroke="#7A8880" stroke-width="2"/>
      <path d="M36,12 Q52,20 52,34 Q52,48 36,48" fill="none" stroke="#9BA8A0" stroke-width="6" stroke-linecap="round"/>
      <rect x="4" y="0" width="28" height="12" rx="2" fill="#C8D0C8"/>
      <!-- Foam -->
      <ellipse cx="18" cy="0" rx="20" ry="8" fill="white" opacity="0.9"/>
    </g>
    <!-- Tankard 2 -->
    <g transform="translate(200,100)">
      <rect x="0" y="0" width="32" height="44" rx="4" fill="#9BA8A0"/>
      <rect x="0" y="0" width="32" height="44" rx="4" fill="none" stroke="#7A8880" stroke-width="2"/>
      <path d="M32,10 Q46,18 46,30 Q46,42 32,42" fill="none" stroke="#9BA8A0" stroke-width="5" stroke-linecap="round"/>
      <ellipse cx="16" cy="0" rx="18" ry="7" fill="white" opacity="0.9"/>
    </g>
    <!-- Pastry plate -->
    <g transform="translate(110,110)">
      <ellipse cx="30" cy="16" rx="35" ry="10" fill="#E8D0A0"/>
      <ellipse cx="30" cy="16" rx="35" ry="10" fill="none" stroke="#C0A060" stroke-width="2"/>
      <circle cx="30" cy="6" r="14" fill="#C84B31" opacity="0.8"/>
      <circle cx="30" cy="6" r="8" fill="#F2A896"/>
      <circle cx="24" cy="3" r="3" fill="#D97706"/>
      <circle cx="36" cy="3" r="3" fill="#D97706"/>
    </g>
  </g>

  <!-- ===== LAYER 6: DOGS (main characters) ===== -->

  <!-- Dog 1 — Golden Retriever seated left of table -->
  <g class="breathe" transform="translate(580,400)" filter="url(#grain)">
    <!-- Body -->
    <ellipse cx="70" cy="180" rx="55" ry="70" fill="url(#goldenCoat)"/>
    <!-- Head -->
    <circle cx="70" cy="90" r="55" fill="url(#goldenCoat)"/>
    <!-- Snout -->
    <ellipse cx="70" cy="108" rx="30" ry="20" fill="#E8AA60"/>
    <!-- Nose -->
    <ellipse cx="70" cy="100" rx="12" ry="8" fill="#2C1810"/>
    <!-- Eyes -->
    <circle cx="52" cy="78" r="10" fill="#2C1810"/>
    <circle cx="88" cy="78" r="10" fill="#2C1810"/>
    <circle cx="55" cy="75" r="4" fill="white"/>
    <circle cx="91" cy="75" r="4" fill="white"/>
    <!-- Ears -->
    <path d="M25,60 Q10,30 20,10 Q40,30 50,60 Z" fill="#C88030"/>
    <path d="M115,60 Q130,30 120,10 Q100,30 90,60 Z" fill="#C88030"/>
    <!-- Paws on table -->
    <ellipse cx="40" cy="240" rx="22" ry="14" fill="#D4883A"/>
    <ellipse cx="100" cy="240" rx="22" ry="14" fill="#D4883A"/>
    <!-- Tail wag -->
    <path d="M120,200 Q160,160 170,130" stroke="#D4883A" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Tabard/vest -->
    <path d="M25,140 Q70,120 115,140 L120,210 Q70,230 20,210 Z" fill="#C84B31" opacity="0.8"/>
  </g>

  <!-- Dog 2 — Corgi seated right of table -->
  <g class="breathe" transform="translate(960,410)" filter="url(#grain)" style="animation-delay:1s">
    <!-- Body -->
    <ellipse cx="65" cy="175" rx="50" ry="65" fill="#F0C060"/>
    <!-- Head -->
    <circle cx="65" cy="85" r="50" fill="#F0C060"/>
    <!-- Snout -->
    <ellipse cx="65" cy="100" rx="28" ry="18" fill="#F8D880"/>
    <!-- Nose -->
    <ellipse cx="65" cy="93" rx="11" ry="7" fill="#2C1810"/>
    <!-- Eyes -->
    <circle cx="48" cy="74" r="9" fill="#2C1810"/>
    <circle cx="82" cy="74" r="9" fill="#2C1810"/>
    <circle cx="51" cy="71" r="3.5" fill="white"/>
    <circle cx="85" cy="71" r="3.5" fill="white"/>
    <!-- Large corgi ears -->
    <path d="M20,55 Q5,15 18,0 Q40,20 45,55 Z" fill="#E8B040"/>
    <path d="M110,55 Q125,15 112,0 Q90,20 85,55 Z" fill="#E8B040"/>
    <!-- Tabard -->
    <path d="M20,135 Q65,115 110,135 L115,200 Q65,220 15,200 Z" fill="#5B21B6" opacity="0.85"/>
  </g>

  <!-- Dog 3 — Small beagle puppy on cushion (background, atmospheric blur) -->
  <g filter="url(#atmos-blur)" transform="translate(800,480)" opacity="0.85">
    <!-- Cushion -->
    <ellipse cx="55" cy="120" rx="60" ry="25" fill="#C84B31" opacity="0.7"/>
    <!-- Body -->
    <ellipse cx="55" cy="95" rx="38" ry="50" fill="#E8C090"/>
    <!-- Head -->
    <circle cx="55" cy="48" r="38" fill="#E8C090"/>
    <!-- Snout -->
    <ellipse cx="55" cy="60" rx="20" ry="14" fill="#F0D0A0"/>
    <!-- Nose -->
    <ellipse cx="55" cy="54" rx="8" ry="5" fill="#2C1810"/>
    <!-- Eyes (sleepy) -->
    <path d="M40,40 Q47,35 54,40" fill="none" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
    <path d="M56,40 Q63,35 70,40" fill="none" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
    <!-- Floppy ears -->
    <path d="M22,40 Q10,60 18,80 Q28,60 38,40 Z" fill="#C89050"/>
    <path d="M88,40 Q100,60 92,80 Q82,60 72,40 Z" fill="#C89050"/>
  </g>

  <!-- ===== LAYER 7: CANDELABRA (foreground, crisp) ===== -->
  <g transform="translate(750,300)">
    <!-- Glow circle behind candle -->
    <circle cx="50" cy="20" r="60" fill="url(#candleGlow)" opacity="0.6"/>
    <!-- Stand -->
    <line x1="50" y1="20" x2="50" y2="180" stroke="#9BA8A0" stroke-width="4"/>
    <!-- Arms -->
    <path d="M50,80 Q20,70 10,50" fill="none" stroke="#9BA8A0" stroke-width="3"/>
    <path d="M50,80 Q80,70 90,50" fill="none" stroke="#9BA8A0" stroke-width="3"/>
    <!-- Candles -->
    <rect x="6" y="30" width="8" height="24" rx="2" fill="#FDF6E8"/>
    <rect x="46" y="0" width="8" height="24" rx="2" fill="#FDF6E8"/>
    <rect x="86" y="30" width="8" height="24" rx="2" fill="#FDF6E8"/>
    <!-- Flames -->
    <ellipse cx="10" cy="28" rx="5" ry="8" fill="#FCD34D" filter="url(#glow)"/>
    <ellipse cx="10" cy="26" rx="3" ry="5" fill="#FFF0A0"/>
    <ellipse cx="50" cy="-2" rx="5" ry="8" fill="#FCD34D" filter="url(#glow)"/>
    <ellipse cx="50" cy="-4" rx="3" ry="5" fill="#FFF0A0"/>
    <ellipse cx="90" cy="28" rx="5" ry="8" fill="#FCD34D" filter="url(#glow)"/>
    <ellipse cx="90" cy="26" rx="3" ry="5" fill="#FFF0A0"/>
    <!-- Base -->
    <ellipse cx="50" cy="180" rx="30" ry="10" fill="#9BA8A0"/>
  </g>

  <!-- ===== LAYER 8: WARM AMBIENT OVERLAY ===== -->
  <rect width="1600" height="900" fill="#D97706" opacity="0.06"/>
  <!-- Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#2C1810" stop-opacity="0.35"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)"/>

</svg>
