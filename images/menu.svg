<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Top-down flat lay of medieval-inspired coffee drinks in pewter tankards, pastries with honey glaze, and bone-shaped dog treats on a worn oak table with candlelight">
  <defs>
    <filter id="grain-menu">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="tableTopMenu" cx="48%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#D4A96A"/>
      <stop offset="60%" stop-color="#A07038"/>
      <stop offset="100%" stop-color="#5C3010"/>
    </radialGradient>
    <radialGradient id="candleMenuGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF4A0" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#D97706" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
    <filter id="candle-glow-filter">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Table surface (top-down) -->
  <rect width="800" height="600" fill="url(#tableTopMenu)" filter="url(#grain-menu)"/>
  <!-- Wood grain lines -->
  <g stroke="#8B5A20" stroke-width="1" opacity="0.3" fill="none">
    <path d="M0,80 Q200,60 400,80 Q600,100 800,80"/>
    <path d="M0,180 Q200,160 400,180 Q600,200 800,180"/>
    <path d="M0,280 Q200,260 400,280 Q600,300 800,280"/>
    <path d="M0,380 Q200,360 400,380 Q600,400 800,380"/>
    <path d="M0,480 Q200,460 400,480 Q600,500 800,480"/>
  </g>

  <!-- Candle glow (warm light source top-center) -->
  <ellipse cx="400" cy="80" rx="220" ry="180" fill="url(#candleMenuGlow)" filter="url(#candle-glow-filter)"/>

  <!-- Candle (top center) -->
  <g transform="translate(380,20)">
    <rect x="0" y="0" width="40" height="70" rx="4" fill="#FDF6E8"/>
    <rect x="0" y="0" width="40" height="70" rx="4" fill="none" stroke="#E8DCC8" stroke-width="1.5"/>
    <!-- Wax drips -->
    <path d="M0,20 Q-3,35 0,40" stroke="#FDF6E8" stroke-width="3" fill="none"/>
    <path d="M40,30 Q43,45 40,50" stroke="#FDF6E8" stroke-width="3" fill="none"/>
    <!-- Flame -->
    <ellipse cx="20" cy="-4" rx="8" ry="14" fill="#FCD34D"/>
    <ellipse cx="20" cy="-6" rx="5" ry="9" fill="#FFF0A0"/>
    <ellipse cx="20" cy="-4" rx="3" ry="6" fill="white" opacity="0.8"/>
    <!-- Holder -->
    <ellipse cx="20" cy="70" rx="28" ry="9" fill="#9BA8A0"/>
    <ellipse cx="20" cy="66" rx="24" ry="7" fill="#B8C4BC"/>
  </g>

  <!-- TANKARD 1 — Mead-Latte (left) -->
  <g transform="translate(80,160)" filter="url(#grain-menu)">
    <!-- Shadow -->
    <ellipse cx="60" cy="190" rx="62" ry="18" fill="#2C1810" opacity="0.2"/>
    <!-- Tankard body -->
    <path d="M10,30 Q5,0 15,0 L105,0 Q115,0 110,30 L100,175 Q100,180 60,180 Q20,180 20,175 Z" fill="#9BA8A0"/>
    <path d="M10,30 Q5,0 15,0 L105,0 Q115,0 110,30 L100,175 Q100,180 60,180 Q20,180 20,175 Z" fill="none" stroke="#7A8880" stroke-width="3"/>
    <!-- Handle -->
    <path d="M110,35 Q145,50 145,90 Q145,130 110,145" fill="none" stroke="#9BA8A0" stroke-width="10" stroke-linecap="round"/>
    <!-- Lid hinge -->
    <circle cx="15" cy="0" r="6" fill="#7A8880"/>
    <!-- Lid (open) -->
    <path d="M0,-10 Q60,-30 120,-10 Q115,-3 60,0 Q5,-3 0,-10 Z" fill="#B8C4BC"/>
    <!-- Coffee inside -->
    <ellipse cx="60" cy="20" rx="45" ry="18" fill="#6B4226"/>
    <!-- Foam/cream -->
    <ellipse cx="60" cy="16" rx="38" ry="12" fill="#FDF6E8" opacity="0.9"/>
    <!-- Latte art swirl -->
    <path d="M35,14 Q50,8 65,14 Q75,18 60,22 Q45,26 35,14 Z" fill="#D4883A" opacity="0.7"/>
    <!-- Honey drizzle on rim -->
    <path d="M25,2 Q28,10 24,18" stroke="#D97706" stroke-width="2.5" fill="none"/>
    <!-- Rivet details -->
    <circle cx="30" cy="80" r="4" fill="#7A8880"/>
    <circle cx="90" cy="80" r="4" fill="#7A8880"/>
    <circle cx="30" cy="120" r="4" fill="#7A8880"/>
    <circle cx="90" cy="120" r="4" fill="#7A8880"/>
  </g>

  <!-- TANKARD 2 — Ale-Espresso (right) -->
  <g transform="translate(560,150)" filter="url(#grain-menu)">
    <ellipse cx="65" cy="195" rx="65" ry="18" fill="#2C1810" opacity="0.2"/>
    <path d="M12,32 Q6,0 16,0 L114,0 Q124,0 118,32 L108,180 Q108,186 65,186 Q22,186 22,180 Z" fill="#8A9590"/>
    <path d="M12,32 Q6,0 16,0 L114,0 Q124,0 118,32 L108,180 Q108,186 65,186 Q22,186 22,180 Z" fill="none" stroke="#6A7870" stroke-width="3"/>
    <path d="M118,38 Q155,55 155,98 Q155,140 118,155" fill="none" stroke="#8A9590" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="22" rx="48" ry="20" fill="#2C1810"/>
    <!-- Espresso foam crema -->
    <ellipse cx="65" cy="18" rx="40" ry="14" fill="#C07830" opacity="0.8"/>
    <ellipse cx="60" cy="14" rx="24" ry="8" fill="#D4A060" opacity="0.6"/>
    <circle cx="16" cy="0" r="6" fill="#6A7870"/>
    <path d="M2,-10 Q65,-32 128,-10 Q124,-3 65,0 Q6,-3 2,-10 Z" fill="#A8B4AC"/>
    <circle cx="34" cy="85" r="4" fill="#6A7870"/>
    <circle cx="96" cy="85" r="4" fill="#6A7870"/>
  </g>

  <!-- PASTRY BOARD (center top) -->
  <g transform="translate(260,60)">
    <!-- Board shadow -->
    <ellipse cx="140" cy="218" rx="148" ry="16" fill="#2C1810" opacity="0.15"/>
    <!-- Wooden board -->
    <rect x="0" y="0" width="280" height="200" rx="14" fill="#C8965A"/>
    <rect x="0" y="0" width="280" height="200" rx="14" fill="none" stroke="#A07030" stroke-width="3"/>
    <!-- Board grain -->
    <g stroke="#A07030" stroke-width="0.8" opacity="0.3" fill="none">
      <path d="M0,50 Q140,30 280,50"/><path d="M0,100 Q140,80 280,100"/>
      <path d="M0,150 Q140,130 280,150"/>
    </g>
    <!-- Handle notch -->
    <circle cx="140" cy="202" r="12" fill="#A07030"/>

    <!-- Croissant -->
    <g transform="translate(20,20)" filter="url(#grain-menu)">
      <path d="M10,60 Q0,30 20,15 Q40,5 60,20 Q80,35 80,60 Q65,70 40,65 Q15,70 10,60 Z" fill="#D4A060"/>
      <path d="M12,58 Q5,32 22,17 Q42,7 58,22" fill="none" stroke="#B07830" stroke-width="3" stroke-linecap="round"/>
      <path d="M16,56 Q10,36 25,21" fill="none" stroke="#C89040" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </g>

    <!-- Muffin center -->
    <g transform="translate(108,18)" filter="url(#grain-menu)">
      <!-- Cup -->
      <path d="M10,50 L5,90 Q5,95 35,95 Q65,95 65,90 L60,50 Z" fill="#C84B31" opacity="0.85"/>
      <!-- Muffin top -->
      <path d="M0,55 Q35,25 70,55 Q65,50 35,45 Q5,50 0,55 Z" fill="#D97706"/>
      <ellipse cx="12" cy="42" rx="9" ry="8" fill="#D97706"/>
      <ellipse cx="35" cy="34" rx="10" ry="9" fill="#D97706"/>
      <ellipse cx="58" cy="42" rx="9" ry="8" fill="#D97706"/>
      <!-- Blueberries -->
      <circle cx="20" cy="38" r="5" fill="#5B21B6" opacity="0.85"/>
      <circle cx="35" cy="30" r="5" fill="#5B21B6" opacity="0.85"/>
      <circle cx="50" cy="38" r="5" fill="#5B21B6" opacity="0.85"/>
    </g>

    <!-- Honey drizzle over pastries -->
    <path d="M100,30 Q115,50 105,70 Q118,58 130,70" stroke="#D97706" stroke-width="3" fill="none" opacity="0.8"/>

    <!-- Scone right -->
    <g transform="translate(185,30)" filter="url(#grain-menu)">
      <ellipse cx="45" cy="55" rx="48" ry="35" fill="#E8C090"/>
      <ellipse cx="45" cy="55" rx="48" ry="35" fill="none" stroke="#C09060" stroke-width="2"/>
      <ellipse cx="42" cy="50" rx="30" ry="20" fill="#F0D0A0" opacity="0.5"/>
      <ellipse cx="42" cy="48" rx="18" ry="12" fill="#F8E0B0" opacity="0.4"/>
      <!-- Clotted cream dollop -->
      <circle cx="45" cy="44" r="14" fill="#FDF6E8" opacity="0.9"/>
      <path d="M35,42 Q45,36 55,42" fill="none" stroke="#E8DCC8" stroke-width="2"/>
      <!-- Jam -->
      <circle cx="45" cy="42" r="7" fill="#C84B31" opacity="0.8"/>
    </g>
  </g>

  <!-- DOG TREAT BOARD (bottom center) -->
  <g transform="translate(220,380)">
    <ellipse cx="180" cy="165" rx="185" ry="14" fill="#2C1810" opacity="0.12"/>
    <rect x="0" y="0" width="360" height="148" rx="14" fill="#A07038"/>
    <rect x="0" y="0" width="360" height="148" rx="14" fill="none" stroke="#7B5020" stroke-width="3"/>
    <!-- Bone treats -->
    <g fill="#F5EDD8" stroke="#DDD0B8" stroke-width="2">
      <!-- Bone 1 -->
      <g transform="translate(28,30)">
        <rect x="16" y="14" width="60" height="18" rx="4" fill="#F5EDD8"/>
        <circle cx="16" cy="14" r="14" fill="#F5EDD8" stroke="#DDD0B8" stroke-width="1.5"/>
        <circle cx="16" cy="32" r="14" fill="#F5EDD8" stroke="#DDD0B8" stroke-width="1.5"/>
        <circle cx="76" cy="14" r="14" fill="#F5EDD8" stroke="#DDD0B8" stroke-width="1.5"/>
        <circle cx="76" cy="32" r="14" fill="#F5EDD8" stroke="#DDD0B8" stroke-width="1.5"/>
        <!-- Honey glaze -->
        <rect x="16" y="14" width="60" height="18" rx="4" fill="#D97706" opacity="0.2"/>
      </g>
      <!-- Bone 2 (rotated) -->
      <g transform="translate(160,24) rotate(35,52,30)">
        <rect x="16" y="14" width="52" height="16" rx="3" fill="#F5EDD8"/>
        <circle cx="16" cy="14" r="12" fill="#F5EDD8" stroke="#DDD0B8" stroke-width="1.5"/>
        <circle cx="16" cy="30" r="12" fill="#F5EDD8" stroke="#DDD0B8" stroke-width="1.5"/>
        <circle cx="68" cy="14" r="12" fill="#F5EDD8" stroke="#DDD0B8" stroke-width="1.5"/>
        <circle cx="68" cy="30" r="12" fill="#F5EDD8" stroke="#DDD0B8" stroke-width="1.5"/>
      </g>
      <!-- Bone 3 small -->
      <g transform="translate(258,55)">
        <rect x="12" y="10" width="44" height="14" rx="3" fill="#EDE0C4"/>
        <circle cx="12" cy="10" r="10" fill="#EDE0C4" stroke="#C8B898" stroke-width="1.5"/>
        <circle cx="12" cy="24" r="10" fill="#EDE0C4" stroke="#C8B898" stroke-width="1.5"/>
        <circle cx="56" cy="10" r="10" fill="#EDE0C4" stroke="#C8B898" stroke-width="1.5"/>
        <circle cx="56" cy="24" r="10" fill="#EDE0C4" stroke="#C8B898" stroke-width="1.5"/>
      </g>
    </g>
    <!-- Paw print cookie -->
    <g transform="translate(50,90)" fill="#C84B31" opacity="0.75">
      <circle cx="30" cy="30" r="18"/>
      <circle cx="10" cy="14" r="9"/>
      <circle cx="28" cy="8" r="9"/>
      <circle cx="46" cy="8" r="9"/>
      <circle cx="50" cy="14" r="9"/>
    </g>
    <!-- "TREATS" paw stamp label -->
    <rect x="250" y="95" width="88" height="30" rx="8" fill="#166534" opacity="0.8"/>
  </g>

  <!-- Honey pot (bottom left) -->
  <g transform="translate(60,380)">
    <ellipse cx="50" cy="130" rx="55" ry="16" fill="#2C1810" opacity="0.15"/>
    <!-- Pot body -->
    <path d="M10,50 Q5,10 50,8 Q95,10 90,50 L88,125 Q88,132 50,132 Q12,132 12,125 Z" fill="#D97706"/>
    <path d="M10,50 Q5,10 50,8 Q95,10 90,50 L88,125 Q88,132 50,132 Q12,132 12,125 Z" fill="none" stroke="#B06010" stroke-width="2"/>
    <!-- Pot rim -->
    <ellipse cx="50" cy="8" rx="42" ry="14" fill="#FCD34D"/>
    <!-- Honey inside -->
    <ellipse cx="50" cy="22" rx="34" ry="10" fill="#FCD34D" opacity="0.8"/>
    <!-- Dipper -->
    <line x1="50" y1="0" x2="30" y2="-40" stroke="#8B5A20" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="28" cy="-44" rx="14" ry="8" fill="#D97706" opacity="0.9"/>
    <!-- "HONEY" stripe label -->
    <g opacity="0.5">
      <rect x="12" y="80" width="76" height="18" rx="4" fill="#FDF6E8"/>
    </g>
  </g>

  <!-- Warm amber overlay -->
  <rect width="800" height="600" fill="#D97706" opacity="0.07"/>
  <radialGradient id="vig-menu" cx="50%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#FFF4D6" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#2C1810" stop-opacity="0.2"/>
  </radialGradient>
  <rect width="800" height="600" fill="url(#vig-menu)"/>
</svg>
