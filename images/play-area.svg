<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Pixar-style cartoon dogs playing in a castle-themed indoor lounge: corgis on rocking horses, a poodle with a foam sword, and a dachshund at a miniature drawbridge">
  <defs>
    <filter id="grain-play">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3"/>
    </filter>
    <filter id="bg-blur-play"><feGaussianBlur stdDeviation="1.1"/></filter>
    <filter id="sky-glow">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <radialGradient id="skylightGrad" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FFF8E0" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#F5EDD8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="floorPlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A96A"/>
      <stop offset="100%" stop-color="#8B5A2B"/>
    </linearGradient>
    <radialGradient id="corgiFurGrad" cx="35%" cy="20%" r="65%">
      <stop offset="0%" stop-color="#F0D080"/>
      <stop offset="55%" stop-color="#D4A040"/>
      <stop offset="100%" stop-color="#8B6010"/>
    </radialGradient>
    <radialGradient id="poodleFur" cx="40%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="60%" stop-color="#E8DCC8"/>
      <stop offset="100%" stop-color="#C0B090"/>
    </radialGradient>
    <radialGradient id="dachshundFur" cx="38%" cy="20%" r="62%">
      <stop offset="0%" stop-color="#C89050"/>
      <stop offset="55%" stop-color="#8B5020"/>
      <stop offset="100%" stop-color="#4A2810"/>
    </radialGradient>
  </defs>

  <!-- Sky background through skylight (far back, blurred) -->
  <rect width="800" height="600" fill="#C9B99A" filter="url(#bg-blur-play)"/>

  <!-- Stone walls background -->
  <g filter="url(#bg-blur-play)" opacity="0.7">
    <g fill="none" stroke="#B0A080" stroke-width="1.2" opacity="0.4">
      <rect x="0" y="0" width="100" height="65"/><rect x="100" y="0" width="120" height="65"/>
      <rect x="220" y="0" width="110" height="65"/><rect x="330" y="0" width="130" height="65"/>
      <rect x="460" y="0" width="100" height="65"/><rect x="560" y="0" width="120" height="65"/>
      <rect x="680" y="0" width="120" height="65"/>
      <rect x="50" y="65" width="120" height="65"/><rect x="170" y="65" width="100" height="65"/>
      <rect x="270" y="65" width="130" height="65"/><rect x="400" y="65" width="110" height="65"/>
      <rect x="510" y="65" width="120" height="65"/><rect x="630" y="65" width="170" height="65"/>
    </g>
    <!-- Padding on walls -->
    <rect x="0" y="200" width="180" height="280" rx="16" fill="#EDE0C4" opacity="0.6"/>
    <rect x="0" y="200" width="180" height="280" rx="16" fill="none" stroke="#DDD0B8" stroke-width="3"/>
    <rect x="620" y="200" width="180" height="280" rx="16" fill="#F2A896" opacity="0.4"/>
    <rect x="620" y="200" width="180" height="280" rx="16" fill="none" stroke="#DDD0B8" stroke-width="3"/>
  </g>

  <!-- Skylight at top center -->
  <g filter="url(#bg-blur-play)">
    <rect x="260" y="0" width="280" height="200" rx="20" fill="#C8E8F8" opacity="0.7"/>
    <rect x="260" y="0" width="280" height="200" rx="20" fill="url(#skylightGrad)"/>
    <rect x="260" y="0" width="280" height="200" rx="20" fill="none" stroke="#9BA8A0" stroke-width="8"/>
    <!-- Skylight cross bars -->
    <line x1="400" y1="0" x2="400" y2="200" stroke="#9BA8A0" stroke-width="5"/>
    <line x1="260" y1="100" x2="540" y2="100" stroke="#9BA8A0" stroke-width="5"/>
  </g>
  <!-- Skylight beam on floor -->
  <path d="M320,200 L480,200 L520,540 L280,540 Z" fill="url(#skylightGrad)" opacity="0.35"/>

  <!-- Floor -->
  <rect x="0" y="500" width="800" height="100" fill="url(#floorPlay)"/>
  <g stroke="#7B4A1E" stroke-width="1" opacity="0.3" fill="none">
    <line x1="0" y1="540" x2="800" y2="540"/>
    <line x1="0" y1="570" x2="800" y2="570"/>
    <line x1="160" y1="500" x2="160" y2="600"/>
    <line x1="320" y1="500" x2="320" y2="600"/>
    <line x1="480" y1="500" x2="480" y2="600"/>
    <line x1="640" y1="500" x2="640" y2="600"/>
  </g>

  <!-- Floor mat / rug -->
  <ellipse cx="400" cy="530" rx="320" ry="60" fill="#C84B31" opacity="0.3"/>
  <ellipse cx="400" cy="530" rx="280" ry="50" fill="none" stroke="#D97706" stroke-width="3" stroke-dasharray="20,10" opacity="0.4"/>

  <!-- DRAWBRIDGE (background center) -->
  <g transform="translate(300,310)" filter="url(#bg-blur-play)" opacity="0.9">
    <!-- Castle wall portion -->
    <rect x="0" y="0" width="200" height="180" rx="4" fill="#C9B99A"/>
    <g fill="none" stroke="#B0A080" stroke-width="1" opacity="0.5">
      <rect x="0" y="0" width="66" height="50"/><rect x="66" y="0" width="68" height="50"/><rect x="134" y="0" width="66" height="50"/>
      <rect x="0" y="50" width="66" height="50"/><rect x="66" y="50" width="68" height="50"/><rect x="134" y="50" width="66" height="50"/>
    </g>
    <!-- Battlements -->
    <rect x="-5" y="-20" width="30" height="25" rx="3" fill="#C9B99A"/>
    <rect x="40" y="-20" width="30" height="25" rx="3" fill="#C9B99A"/>
    <rect x="85" y="-20" width="30" height="25" rx="3" fill="#C9B99A"/>
    <rect x="130" y="-20" width="30" height="25" rx="3" fill="#C9B99A"/>
    <rect x="175" y="-20" width="30" height="25" rx="3" fill="#C9B99A"/>
    <!-- Portcullis / gate -->
    <rect x="70" y="60" width="60" height="90" rx="0" fill="#5C3317"/>
    <path d="M70,80 Q100,60 130,80" fill="#4A2810"/>
    <!-- Portcullis bars -->
    <g stroke="#8B5A20" stroke-width="3" opacity="0.6">
      <line x1="82" y1="60" x2="82" y2="150"/>
      <line x1="100" y1="60" x2="100" y2="150"/>
      <line x1="118" y1="60" x2="118" y2="150"/>
      <line x1="70" y1="80" x2="130" y2="80"/>
      <line x1="70" y1="100" x2="130" y2="100"/>
      <line x1="70" y1="120" x2="130" y2="120"/>
    </g>
    <!-- Drawbridge planks (lowered) -->
    <rect x="70" y="145" width="60" height="100" rx="3" fill="#A07038"/>
    <g stroke="#7B5020" stroke-width="1.5" opacity="0.5" fill="none">
      <line x1="70" y1="165" x2="130" y2="165"/>
      <line x1="70" y1="185" x2="130" y2="185"/>
      <line x1="70" y1="205" x2="130" y2="205"/>
      <line x1="70" y1="225" x2="130" y2="225"/>
    </g>
    <!-- Drawbridge chains -->
    <path d="M70,145 Q50,100 40,60" stroke="#9BA8A0" stroke-width="3" fill="none" stroke-dasharray="6,4"/>
    <path d="M130,145 Q150,100 160,60" stroke="#9BA8A0" stroke-width="3" fill="none" stroke-dasharray="6,4"/>
  </g>

  <!-- ROCKING HORSE 1 (left) -->
  <g transform="translate(60,330)">
    <!-- Rockers -->
    <path d="M0,200 Q70,180 140,200" stroke="#8B5A20" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <ellipse cx="70" cy="160" rx="70" ry="45" fill="#C84B31"/>
    <ellipse cx="70" cy="155" rx="60" ry="38" fill="#D96040" opacity="0.5"/>
    <!-- Neck -->
    <path d="M105,130 Q135,100 130,60" stroke="#C84B31" stroke-width="28" fill="none" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="128" cy="50" r="36" fill="#C84B31"/>
    <ellipse cx="140" cy="64" rx="22" ry="16" fill="#D96040"/>
    <!-- Nose -->
    <ellipse cx="148" cy="62" rx="8" ry="5" fill="#8B2010"/>
    <!-- Eye -->
    <circle cx="118" cy="42" r="9" fill="#2C1810"/>
    <circle cx="115" cy="39" r="3.5" fill="white"/>
    <!-- Mane -->
    <path d="M108,22 Q120,4 132,22 Q120,30 108,22 Z" fill="#D97706"/>
    <path d="M96,28 Q110,10 120,28 Q110,36 96,28 Z" fill="#D97706"/>
    <!-- Legs -->
    <rect x="30" y="195" width="14" height="30" rx="4" fill="#8B5A20"/>
    <rect x="96" y="195" width="14" height="30" rx="4" fill="#8B5A20"/>
    <!-- Saddle -->
    <ellipse cx="60" cy="118" rx="40" ry="16" fill="#5B21B6"/>
    <ellipse cx="60" cy="116" rx="32" ry="10" fill="#7C4AE0" opacity="0.5"/>
    <!-- Stirrups -->
    <line x1="28" y1="126" x2="22" y2="160" stroke="#9BA8A0" stroke-width="3"/>
    <line x1="92" y1="126" x2="98" y2="160" stroke="#9BA8A0" stroke-width="3"/>
    <rect x="16" y="158" width="14" height="8" rx="3" fill="#9BA8A0"/>
    <rect x="92" y="158" width="14" height="8" rx="3" fill="#9BA8A0"/>
  </g>

  <!-- CORGI ON ROCKING HORSE 1 -->
  <g class="breathe" transform="translate(90,230)" filter="url(#grain-play)">
    <!-- Body -->
    <ellipse cx="40" cy="95" rx="32" ry="44" fill="url(#corgiFurGrad)"/>
    <!-- Head -->
    <circle cx="40" cy="50" r="38" fill="url(#corgiFurGrad)"/>
    <!-- Snout -->
    <ellipse cx="40" cy="62" rx="22" ry="15" fill="#F0D080"/>
    <ellipse cx="40" cy="56" rx="9" ry="6" fill="#2C1810"/>
    <!-- Big eyes (joyful) -->
    <circle cx="24" cy="42" r="10" fill="#2C1810"/>
    <circle cx="56" cy="42" r="10" fill="#2C1810"/>
    <circle cx="21" cy="39" r="4" fill="white"/>
    <circle cx="53" cy="39" r="4" fill="white"/>
    <!-- Smile -->
    <path d="M26,64 Q40,76 54,64" fill="none" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
    <!-- Tongue out (excited) -->
    <path d="M32,72 Q40,82 48,72" fill="#E8607A"/>
    <!-- Ears -->
    <path d="M10,28 Q0,4 12,-8 Q26,8 30,30 Z" fill="#D4A040"/>
    <path d="M70,28 Q80,4 68,-8 Q54,8 50,30 Z" fill="#D4A040"/>
    <!-- Tiny lance / jousting pole -->
    <line x1="70" y1="70" x2="200" y2="20" stroke="#A07038" stroke-width="6" stroke-linecap="round"/>
    <!-- Lance tip pennant -->
    <path d="M200,20 L220,10 L210,28 Z" fill="#C84B31"/>
    <!-- Arms holding lance -->
    <path d="M56,90 Q70,75 80,72" stroke="url(#corgiFurGrad)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- Tiny helmet -->
    <path d="M12,16 Q40,-10 68,16 Q64,6 40,4 Q16,6 12,16 Z" fill="#9BA8A0"/>
    <rect x="30" y="4" width="20" height="30" rx="3" fill="#9BA8A0"/>
  </g>

  <!-- ROCKING HORSE 2 (right side) -->
  <g transform="translate(560,320)">
    <path d="M0,210 Q80,188 160,210" stroke="#166534" stroke-width="12" fill="none" stroke-linecap="round"/>
    <ellipse cx="80" cy="165" rx="75" ry="48" fill="#166534"/>
    <ellipse cx="80" cy="160" rx="64" ry="40" fill="#1A7A3C" opacity="0.5"/>
    <path d="M118,136 Q148,105 142,62" stroke="#166534" stroke-width="30" fill="none" stroke-linecap="round"/>
    <circle cx="140" cy="52" r="38" fill="#166534"/>
    <ellipse cx="153" cy="66" rx="24" ry="18" fill="#1A7A3C"/>
    <ellipse cx="162" cy="64" rx="9" ry="6" fill="#0D4020"/>
    <circle cx="128" cy="42" r="9" fill="#2C1810"/>
    <circle cx="125" cy="39" r="3.5" fill="white"/>
    <path d="M118,24 Q132,6 144,24 Q132,32 118,24 Z" fill="#D97706"/>
    <path d="M106,30 Q120,12 130,30 Q120,38 106,30 Z" fill="#D97706"/>
    <rect x="36" y="205" width="14" height="30" rx="4" fill="#0D4020"/>
    <rect x="110" y="205" width="14" height="30" rx="4" fill="#0D4020"/>
    <ellipse cx="68" cy="118" rx="44" ry="18" fill="#C84B31"/>
    <ellipse cx="68" cy="116" rx="36" ry="12" fill="#E06040" opacity="0.5"/>
    <line x1="32" y1="128" x2="26" y2="165" stroke="#9BA8A0" stroke-width="3"/>
    <line x1="104" y1="128" x2="110" y2="165" stroke="#9BA8A0" stroke-width="3"/>
    <rect x="20" y="163" width="14" height="8" rx="3" fill="#9BA8A0"/>
    <rect x="104" y="163" width="14" height="8" rx="3" fill="#9BA8A0"/>
  </g>

  <!-- SECOND CORGI ON HORSE 2 -->
  <g class="breathe" transform="translate(598,218)" filter="url(#grain-play)" style="animation-delay:0.8s">
    <ellipse cx="40" cy="95" rx="32" ry="42" fill="url(#corgiFurGrad)"/>
    <circle cx="40" cy="50" r="36" fill="url(#corgiFurGrad)"/>
    <ellipse cx="40" cy="62" rx="22" ry="15" fill="#F0D080"/>
    <ellipse cx="40" cy="56" rx="9" ry="6" fill="#2C1810"/>
    <circle cx="24" cy="42" r="10" fill="#2C1810"/>
    <circle cx="56" cy="42" r="10" fill="#2C1810"/>
    <circle cx="21" cy="39" r="4" fill="white"/>
    <circle cx="53" cy="39" r="4" fill="white"/>
    <path d="M26,64 Q40,76 54,64" fill="none" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
    <path d="M10,28 Q0,4 12,-8 Q26,8 30,30 Z" fill="#D4A040"/>
    <path d="M70,28 Q80,4 68,-8 Q54,8 50,30 Z" fill="#D4A040"/>
    <!-- Shield -->
    <path d="M-15,72 Q-24,88 -22,102 Q-16,112 -5,116 Q6,112 12,102 Q14,88 5,72 Z" fill="#5B21B6"/>
    <path d="M-10,78 Q-12,90 -5,100 Q2,106 8,100 Q14,90 10,78 Z" fill="#7C4AE0" opacity="0.5"/>
    <!-- Paw print on shield -->
    <circle cx="-1" cy="90" r="5" fill="#D97706"/>
    <circle cx="-8" cy="82" r="3" fill="#D97706"/>
    <circle cx="-1" cy="79" r="3" fill="#D97706"/>
    <circle cx="6" cy="82" r="3" fill="#D97706"/>
    <path d="M56,82 Q70,68 80,66" stroke="url(#corgiFurGrad)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M12,28 Q40,-10 68,28 Q64,18 40,16 Q16,18 12,28 Z" fill="#9BA8A0"/>
    <rect x="30" y="16" width="20" height="28" rx="3" fill="#9BA8A0"/>
  </g>

  <!-- POODLE with foam sword (center) -->
  <g class="breathe" transform="translate(330,330)" filter="url(#grain-play)" style="animation-delay:1.5s">
    <!-- Poodle body puffs -->
    <circle cx="60" cy="155" r="35" fill="url(#poodleFur)"/>
    <circle cx="35" cy="140" r="25" fill="url(#poodleFur)"/>
    <circle cx="85" cy="140" r="25" fill="url(#poodleFur)"/>
    <!-- Head -->
    <circle cx="60" cy="75" r="45" fill="url(#poodleFur)"/>
    <!-- Poodle ear puffs -->
    <circle cx="20" cy="75" r="22" fill="url(#poodleFur)"/>
    <circle cx="100" cy="75" r="22" fill="url(#poodleFur)"/>
    <!-- Snout -->
    <ellipse cx="60" cy="92" rx="26" ry="18" fill="#E8DCC8"/>
    <ellipse cx="60" cy="86" rx="10" ry="7" fill="#2C1810"/>
    <!-- Eyes -->
    <circle cx="44" cy="65" r="11" fill="#2C1810"/>
    <circle cx="76" cy="65" r="11" fill="#2C1810"/>
    <circle cx="41" cy="62" r="4.5" fill="white"/>
    <circle cx="73" cy="62" r="4.5" fill="white"/>
    <!-- Smile -->
    <path d="M44,95 Q60,108 76,95" fill="none" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
    <!-- Tongue -->
    <path d="M50,102 Q60,112 70,102" fill="#E8607A"/>
    <!-- Bow on head -->
    <path d="M42,30 Q60,20 78,30 Q70,40 60,38 Q50,40 42,30 Z" fill="#C84B31"/>
    <!-- Foam sword -->
    <rect x="92" y="-20" width="12" height="120" rx="6" fill="#FCD34D" opacity="0.9"/>
    <rect x="76" y="20" width="44" height="10" rx="5" fill="#D97706"/>
    <rect x="78" y="80" width="40" height="12" rx="5" fill="#9BA8A0"/>
    <!-- Paw holding sword -->
    <circle cx="95" cy="95" r="14" fill="url(#poodleFur)"/>
    <!-- Front paws -->
    <circle cx="32" cy="180" r="14" fill="url(#poodleFur)"/>
    <circle cx="88" cy="180" r="14" fill="url(#poodleFur)"/>
    <!-- Legs -->
    <ellipse cx="32" cy="195" rx="12" ry="20" fill="url(#poodleFur)"/>
    <ellipse cx="88" cy="195" rx="12" ry="20" fill="url(#poodleFur)"/>
  </g>

  <!-- DACHSHUND at drawbridge -->
  <g class="breathe" transform="translate(332,390)" filter="url(#grain-play)" style="animation-delay:2s">
    <!-- Long dachshund body -->
    <ellipse cx="90" cy="70" rx="90" ry="40" fill="url(#dachshundFur)"/>
    <!-- Tail -->
    <path d="M178,55 Q210,40 220,55 Q210,65 178,68" fill="url(#dachshundFur)"/>
    <!-- Head -->
    <circle cx="20" cy="48" r="40" fill="url(#dachshundFur)"/>
    <!-- Long snout -->
    <ellipse cx="0" cy="62" rx="30" ry="20" fill="#A07040"/>
    <ellipse cx="-8" cy="58" rx="12" ry="8" fill="#2C1810"/>
    <!-- Eyes -->
    <circle cx="14" cy="38" r="11" fill="#2C1810"/>
    <circle cx="36" cy="36" r="10" fill="#2C1810"/>
    <circle cx="11" cy="35" r="4" fill="white"/>
    <circle cx="33" cy="33" r="4" fill="white"/>
    <!-- Floppy ears -->
    <path d="M-10,40 Q-30,30 -28,80 Q-10,70 6,40 Z" fill="#8B5020"/>
    <path d="M50,32 Q70,22 68,72 Q50,62 34,32 Z" fill="#8B5020"/>
    <!-- Smile -->
    <path d="M-16,68 Q0,80 16,68" fill="none" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
    <!-- Short legs -->
    <ellipse cx="50" cy="104" rx="12" ry="18" fill="#8B5020"/>
    <ellipse cx="80" cy="106" rx="12" ry="18" fill="#8B5020"/>
    <ellipse cx="110" cy="106" rx="12" ry="18" fill="#8B5020"/>
    <ellipse cx="140" cy="104" rx="12" ry="18" fill="#8B5020"/>
    <!-- Mini crown on head -->
    <path d="M2,12 L2,2 L10,8 L18,0 L26,8 L34,2 L34,12 Z" fill="#D97706"/>
  </g>

  <!-- Warm overlay and vignette -->
  <rect width="800" height="600" fill="#D97706" opacity="0.06"/>
  <radialGradient id="vig-play" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#2C1810" stop-opacity="0.3"/>
  </radialGradient>
  <rect width="800" height="600" fill="url(#vig-play)"/>
</svg>
