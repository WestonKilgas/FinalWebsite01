<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 792 72" width="792" height="72" role="img" aria-label="Château Barkalot icon set">
  <!-- Stroke 1.75px, rounded caps, lg radius fills, palette-bound -->
  <defs>
    <style>
      .icon { fill: none; stroke: #C84B31; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
      .icon-fill { fill: #C84B31; stroke: none; }
      .icon-accent { fill: none; stroke: #D97706; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- 1. Crown (Hero / branding) — x=4 -->
  <g transform="translate(4,4)">
    <path class="icon" d="M4,48 L4,28 L16,40 L32,16 L48,40 L60,28 L60,48 Z"/>
    <rect class="icon" x="4" y="48" width="56" height="12" rx="6"/>
    <circle class="icon-fill" cx="32" cy="16" r="4"/>
    <circle class="icon-fill" cx="16" cy="40" r="3"/>
    <circle class="icon-fill" cx="48" cy="40" r="3"/>
  </g>

  <!-- 2. Paw (About / general) — x=76 -->
  <g transform="translate(76,4)">
    <circle class="icon" cx="32" cy="42" r="18"/>
    <circle class="icon" cx="14" cy="26" r="9"/>
    <circle class="icon" cx="28" cy="18" r="9"/>
    <circle class="icon" cx="50" cy="18" r="9"/><!-- 3 toes was wrong, needs 4 -->
    <circle class="icon" cx="32" cy="14" r="9"/>
    <circle class="icon" cx="50" cy="26" r="9"/>
  </g>

  <!-- 3. Tankard (Menu) — x=148 -->
  <g transform="translate(148,4)">
    <path class="icon" d="M12,8 L12,60 Q12,64 32,64 Q52,64 52,60 L52,8 Z"/>
    <path class="icon" d="M52,20 Q66,24 66,36 Q66,48 52,48"/>
    <rect class="icon" x="8" y="4" width="48" height="10" rx="5"/>
    <ellipse class="icon" cx="32" cy="12" rx="22" ry="6"/>
  </g>

  <!-- 4. Grail (specialty drinks) — x=220 -->
  <g transform="translate(220,4)">
    <path class="icon" d="M12,8 Q8,32 22,44 L18,60 L46,60 L42,44 Q56,32 52,8 Z"/>
    <line class="icon" x1="18" y1="60" x2="46" y2="60"/>
    <path class="icon-accent" d="M20,30 Q32,24 44,30"/>
    <!-- Glow lines -->
    <line class="icon-accent" x1="32" y1="8" x2="32" y2="16"/>
    <line class="icon-accent" x1="24" y1="10" x2="22" y2="18"/>
    <line class="icon-accent" x1="40" y1="10" x2="42" y2="18"/>
  </g>

  <!-- 5. Crossed swords (Play Area) — x=292 -->
  <g transform="translate(292,4)">
    <line class="icon" x1="8" y1="8" x2="56" y2="60"/>
    <line class="icon" x1="56" y1="8" x2="8" y2="60"/>
    <!-- Guards -->
    <line class="icon" x1="16" y1="24" x2="28" y2="12"/>
    <line class="icon" x1="48" y1="24" x2="36" y2="12"/>
    <!-- Pommels -->
    <circle class="icon" cx="12" cy="12" r="5"/>
    <circle class="icon" cx="52" cy="12" r="5"/>
  </g>

  <!-- 6. Scroll (Events) — x=364 -->
  <g transform="translate(364,4)">
    <path class="icon" d="M16,8 Q8,8 8,20 L8,52 Q8,64 16,64 L48,64 Q56,64 56,52 L56,20 Q56,8 48,8 Z"/>
    <path class="icon" d="M8,20 Q4,20 4,28 Q4,36 8,36"/>
    <path class="icon" d="M56,20 Q60,20 60,28 Q60,36 56,36"/>
    <line class="icon" x1="20" y1="24" x2="44" y2="24"/>
    <line class="icon" x1="20" y1="34" x2="44" y2="34"/>
    <line class="icon" x1="20" y1="44" x2="36" y2="44"/>
  </g>

  <!-- 7. Heart-paw (Adoptable) — x=436 -->
  <g transform="translate(436,4)">
    <path class="icon" d="M32,56 Q8,40 8,24 Q8,12 20,12 Q26,12 32,20 Q38,12 44,12 Q56,12 56,24 Q56,40 32,56 Z"/>
    <!-- Small paw inside heart -->
    <circle class="icon-fill" cx="32" cy="36" r="5" opacity="0.6"/>
    <circle class="icon-fill" cx="24" cy="29" r="3" opacity="0.6"/>
    <circle class="icon-fill" cx="32" cy="26" r="3" opacity="0.6"/>
    <circle class="icon-fill" cx="40" cy="29" r="3" opacity="0.6"/>
  </g>

  <!-- 8. Camera (Gallery) — x=508 -->
  <g transform="translate(508,4)">
    <rect class="icon" x="6" y="20" width="52" height="38" rx="8"/>
    <path class="icon" d="M20,20 L24,10 L40,10 L44,20"/>
    <circle class="icon" cx="32" cy="38" r="12"/>
    <circle class="icon-fill" cx="32" cy="38" r="5"/>
    <circle class="icon-fill" cx="50" cy="26" r="3"/>
  </g>

  <!-- 9. Quote scroll (Testimonials) — x=580 -->
  <g transform="translate(580,4)">
    <path class="icon" d="M8,12 Q8,8 12,8 L52,8 Q56,8 56,12 L56,44 Q56,48 52,48 L36,48 L28,60 L28,48 L12,48 Q8,48 8,44 Z"/>
    <!-- Quote marks -->
    <path class="icon-accent" d="M20,24 Q18,28 20,32 L24,32" stroke-width="2.5"/>
    <path class="icon-accent" d="M30,24 Q28,28 30,32 L34,32" stroke-width="2.5"/>
  </g>

  <!-- 10. Question shield (FAQ) — x=652 -->
  <g transform="translate(652,4)">
    <path class="icon" d="M8,8 Q8,4 12,4 L52,4 Q56,4 56,8 L56,44 Q56,60 32,68 Q8,60 8,44 Z"/>
    <path class="icon" d="M24,26 Q24,18 32,18 Q40,18 40,26 Q40,32 32,36 L32,42"/>
    <circle class="icon-fill" cx="32" cy="50" r="3"/>
  </g>

  <!-- 11. Envelope wax seal (Contact) — x=724 -->
  <g transform="translate(724,4)">
    <rect class="icon" x="4" y="14" width="56" height="44" rx="8"/>
    <path class="icon" d="M4,14 L32,38 L60,14"/>
    <!-- Wax seal dot -->
    <circle cx="32" cy="46" r="8" fill="#C84B31" opacity="0.2" stroke="#C84B31" stroke-width="1.75"/>
    <circle cx="32" cy="46" r="4" fill="#C84B31" opacity="0.5"/>
  </g>
</svg>
